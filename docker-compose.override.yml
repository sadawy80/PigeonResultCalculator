# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.override.yml  —  DEVELOPMENT overrides
#
#  This file is merged automatically by Docker Compose in development.
#  It is NOT used in production (only docker-compose.yml is used there).
#
#  Usage:
#    docker compose up              # development (uses both files)
#    docker compose -f docker-compose.yml up  # production (base file only)
# ─────────────────────────────────────────────────────────────────────────────

name: pigeon-racing

services:

  api:
    build:
      target: build      # Stop at build stage — faster dev rebuilds
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
    volumes:
      # Mount source for hot reload via dotnet watch
      - .:/src:cached
      - /src/backend/API/bin
      - /src/backend/API/obj
      - /src/backend/Application/bin
      - /src/backend/Application/obj
      - /src/backend/Domain/bin
      - /src/backend/Domain/obj
      - /src/backend/Infrastructure/bin
      - /src/backend/Infrastructure/obj
    command: >
      dotnet watch run
        --project backend/API/PigeonRacing.API.csproj
        --no-launch-profile
    # Relax health check in dev — first build is slow
    healthcheck:
      start_period: 120s
      interval: 30s

  ui:
    build:
      context: frontend
      target: build
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    command: npm start -- --host 0.0.0.0 --poll 2000
    ports:
      - "4300:4300"

  sqlserver:
    # Expose SQL Server port locally for connecting with SSMS / Azure Data Studio
    ports:
      - "1433:1433"

  redis:
    # Expose Redis for local debugging with redis-cli
    ports:
      - "6379:6379"

  # Scale down observability in dev — lighter footprint
  prometheus:
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=3d"
      - "--web.enable-lifecycle"

  grafana:
    environment:
      GF_LOG_LEVEL: warn
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_SECURITY_ADMIN_USER: "admin"
