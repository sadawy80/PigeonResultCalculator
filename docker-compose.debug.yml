# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.debug.yml  —  VS Code debugger overrides
#
#  Usage (always layer on top of both base + override):
#    docker compose \
#      -f docker-compose.yml \
#      -f docker-compose.override.yml \
#      -f docker-compose.debug.yml \
#      up -d
#
#  Or use VS Code task: "docker: start debug stack"
#
#  What this adds:
#    api  — builds the "debug" Dockerfile target (includes vsdbg)
#           runs dotnet run instead of dotnet watch run so the process
#           stays alive and the C# debugger can attach via "docker exec"
# ─────────────────────────────────────────────────────────────────────────────

name: pigeon-racing

services:

  api:
    build:
      target: debug              # Dockerfile target that has vsdbg installed
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # vsdbg needs to be able to find the running dotnet process
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
    command: >
      dotnet run
        --project backend/API/PigeonRacing.API.csproj
        --no-launch-profile
