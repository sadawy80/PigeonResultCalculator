server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/rss+xml application/atom+xml
        image/svg+xml application/wasm;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"              always;
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header X-XSS-Protection         "1; mode=block"           always;
    add_header Referrer-Policy          "strict-origin"           always;
    add_header Permissions-Policy       "camera=(), microphone=()" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|svg|png|ico|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── Angular SPA — all routes serve index.html ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
