# Port 80 — internal health check only (not exposed on the host)
server {
    listen 80;
    server_name _;

    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

# Port 443 — HTTPS, serves the Angular SPA + proxies API/SignalR
server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/rss+xml application/atom+xml
        image/svg+xml application/wasm;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN"              always;
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header X-XSS-Protection         "1; mode=block"           always;
    add_header Referrer-Policy          "strict-origin"           always;
    add_header Permissions-Policy       "camera=(), microphone=()" always;

    # ── API proxy → api-gateway ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api-gateway:9500/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SignalR / WebSocket proxy ─────────────────────────────────────────────
    location /hubs/ {
        proxy_pass         http://api-gateway:9500/hubs/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|svg|png|ico|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Angular SPA — all routes serve index.html ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
