<button class="pr-btn pr-btn--outline pr-btn--sm print-btn" (click)="open()">
  🖨 {{ label }}
</button>

@if (pickerOpen()) {
  <app-design-picker
    [category]="category"
    [raceId]="raceId"
    [programmeId]="programmeId"
    [raceResultId]="raceResultId"
    (close)="close()">
  </app-design-picker>
}
