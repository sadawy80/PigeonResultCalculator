<button class="pr-btn pr-btn--outline pr-btn--sm" (click)="open()">
  🏅 Generate Certificate
</button>

@if (isOpen()) {
  <app-design-picker
    [category]="TemplateCategory.Certificate"
    [certSubType]="certType"
    [raceResultId]="raceResultId"
    [programmeId]="programmeId"
    [fancierUserId]="fancierUserId"
    [ringNumber]="ringNumber"
    (close)="close()">
  </app-design-picker>
}
