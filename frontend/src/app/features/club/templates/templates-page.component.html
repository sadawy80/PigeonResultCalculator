<div class="pr-page-header flex justify-between items-center">
  <div>
    <h1 class="pr-page-header__title">Print Templates</h1>
    <p class="pr-page-header__subtitle">
      Pick a category, choose a design, download PDF or Excel.
    </p>
  </div>
</div>

<div class="template-quick-grid mb-8">
  @for (cat of quickCategories; track cat.cat) {
    <div class="quick-card pr-card" (click)="openCategory(cat.cat)">
      <div class="quick-card__icon">{{ cat.icon }}</div>
      <div class="quick-card__title">{{ cat.label }}</div>
      <div class="quick-card__desc">{{ cat.desc }}</div>
      <div class="quick-card__cta">Open →</div>
    </div>
  }
</div>

@if (showPicker()) {
  <app-design-picker
    [category]="activeCategory()"
    [raceId]="queryRaceId"
    [programmeId]="queryProgrammeId"
    [raceResultId]="queryRaceResultId"
    (close)="close()">
  </app-design-picker>
}
