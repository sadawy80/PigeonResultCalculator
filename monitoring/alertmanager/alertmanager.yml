global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@pigeonresultcalculator.com'
  smtp_auth_username: ''
  smtp_auth_password: ''
  slack_api_url: 'https://hooks.slack.com/services/T00000000/B00000000/placeholder'

# ── Templates ─────────────────────────────────────────────────────────────────
templates:
  - '/etc/alertmanager/*.tmpl'

# ── Routing tree ──────────────────────────────────────────────────────────────
route:
  receiver: platform-slack
  group_by: ['alertname', 'severity', 'service']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: platform-critical
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 30m
      routes:
        - match:
            alertname: APIDown
          receiver: all-channels
          group_wait: 0s

    - match:
        team: security
      receiver: security-slack
      group_wait: 0s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: platform-slack
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 6h

    - match:
        alertname: Watchdog
      receiver: devnull
      group_wait: 0s

# ── Inhibition rules ──────────────────────────────────────────────────────────
inhibit_rules:
  - source_match:
      alertname: APIDown
    target_match_re:
      alertname: HighHTTPErrorRate|HighLatency.*|ElevatedHTTPErrorRate
    equal: ['environment']

  - source_match:
      alertname: SQLServerDown
    target_match_re:
      alertname: DBConnectionPool.*|SlowDBQueries
    equal: ['environment']

  - source_match:
      alertname: RedisDown
    target_match_re:
      alertname: Redis.*
    equal: ['environment']

  - source_match:
      alertname: CriticalHostMemory
    target_match_re:
      alertname: ContainerHighMemory
    equal: ['instance']

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:

  - name: devnull

  - name: platform-slack
    slack_configs:
      - channel: '#pigeon-alerts'
        send_resolved: true
        icon_emoji: ':warning:'
        username: 'PRC Alerts'
        title: |-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ if .Annotations.dashboard }}*Dashboard:* {{ .Annotations.dashboard }}{{ end }}
          *Started:* {{ .StartsAt | since }}
          {{ end }}

  - name: platform-critical
    slack_configs:
      - channel: '#pigeon-alerts-critical'
        send_resolved: true
        icon_emoji: ':fire:'
        username: 'PRC CRITICAL'
        title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Started: {{ .StartsAt | since }} ago
          {{ end }}
    email_configs:
      - to: 'ops@pigeonresultcalculator.com'
        send_resolved: true
        headers:
          Subject: '🚨 CRITICAL ALERT: {{ .CommonLabels.alertname }}'
        html: |-
          <h2>🚨 {{ .CommonLabels.alertname }}</h2>
          {{ range .Alerts }}
          <p><strong>{{ .Annotations.summary }}</strong></p>
          <p>{{ .Annotations.description }}</p>
          <p>Severity: {{ .Labels.severity }}</p>
          <p>Started: {{ .StartsAt }}</p>
          {{ end }}

  - name: security-slack
    slack_configs:
      - channel: '#pigeon-security'
        send_resolved: true
        icon_emoji: ':lock:'
        username: 'PRC Security'
        title: '🔒 Security Alert: {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  - name: all-channels
    slack_configs:
      - channel: '#pigeon-alerts-critical'
        send_resolved: true
        icon_emoji: ':rotating_light:'
        title: '🚨 API DOWN: {{ .CommonLabels.alertname }}'
        text: 'The PRC API is unreachable. All services are affected.'
    email_configs:
      - to: 'ops@pigeonresultcalculator.com'
        send_resolved: true
        headers:
          Subject: '🚨 OUTAGE: PRC API is DOWN'
        html: '<h1>🚨 PRC API is DOWN</h1><p>The API has been unreachable for more than 1 minute. Immediate action required.</p>'
