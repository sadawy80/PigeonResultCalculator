apiVersion: 1

datasources:

  # ── Prometheus ────────────────────────────────────────────────────────────────
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      queryTimeout: 60s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
    version: 1

  # ── Loki ──────────────────────────────────────────────────────────────────────
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 5000
      timeout: 60
      derivedFields:
        # Link trace_id in logs to a Tempo trace (if Tempo is added later)
        - matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: '$${__value.raw}'
          datasourceUid: tempo
        # Link correlation_id back to Loki query
        - matcherRegex: '"correlation_id":"([^"]+)"'
          name: CorrelationID
          url: '/explore?orgId=1&left={"datasource":"loki","queries":[{"expr":"{service=~\".+\"} |= \"$${__value.raw}\""}]}'
    version: 1

  # ── Alertmanager ──────────────────────────────────────────────────────────────
  - name: Alertmanager
    uid: alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    editable: false
    jsonData:
      implementation: prometheus
    version: 1
