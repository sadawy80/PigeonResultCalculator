global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    application: pigeon-racing

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

# ── Alert rule files ──────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/api.rules.yml
  - /etc/prometheus/rules/infrastructure.rules.yml
  - /etc/prometheus/rules/business.rules.yml
  - /etc/prometheus/rules/database.rules.yml

# ── Scrape configurations ─────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - target_label: service
        replacement: prometheus

  # ── PigeonRacing .NET API ─────────────────────────────────────────────────────
  - job_name: pigeon-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']
    relabel_configs:
      - target_label: service
        replacement: pigeon-api
      - target_label: environment
        replacement: production
    metric_relabel_configs:
      # Drop high-cardinality route labels, keep only route pattern
      - source_labels: [__name__]
        regex: "http_request_duration_seconds.*"
        action: keep

  # ── Node Exporter — host metrics ─────────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - target_label: service
        replacement: host
    metric_relabel_configs:
      # Keep only the most useful filesystem metrics
      - source_labels: [__name__, mountpoint]
        regex: "node_filesystem.*;/var/lib/docker"
        action: drop

  # ── cAdvisor — Docker container metrics ──────────────────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - target_label: service
        replacement: cadvisor
    metric_relabel_configs:
      # Only keep containers that belong to our stack
      - source_labels: [container_label_service]
        regex: "pigeon-.*|prometheus|grafana|loki|promtail|alertmanager|node-exporter|cadvisor|redis-exporter|postgres-exporter"
        action: keep
      # Drop empty container names (pause containers etc)
      - source_labels: [name]
        regex: ".+"
        action: keep

  # ── Redis Exporter ────────────────────────────────────────────────────────────
  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - target_label: service
        replacement: redis

  # ── SQL Server (via sql_exporter or postgres_exporter compat) ─────────────────
  - job_name: sqlserver-exporter
    static_configs:
      - targets: ['sql-exporter:9399']
    relabel_configs:
      - target_label: service
        replacement: sqlserver

  # ── Alertmanager self-monitoring ──────────────────────────────────────────────
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
    relabel_configs:
      - target_label: service
        replacement: alertmanager

  # ── Grafana self-monitoring ───────────────────────────────────────────────────
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: grafana

  # ── Loki self-monitoring ──────────────────────────────────────────────────────
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: loki
