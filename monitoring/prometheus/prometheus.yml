global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    application: pigeon-racing

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

# ── Alert rule files ──────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/api.rules.yml
  - /etc/prometheus/rules/infrastructure.rules.yml
  - /etc/prometheus/rules/business.rules.yml
  - /etc/prometheus/rules/database.rules.yml

# ── Scrape configurations ─────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - target_label: service
        replacement: prometheus

  # ── PRC Microservices ─────────────────────────────────────────────────────────
  - job_name: prc-api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['api-gateway:9500']
    relabel_configs:
      - target_label: service
        replacement: api-gateway
      - target_label: environment
        replacement: production

  - job_name: prc-identity
    metrics_path: /metrics
    static_configs:
      - targets: ['identity-service:9501']
    relabel_configs:
      - target_label: service
        replacement: identity-service
      - target_label: environment
        replacement: production

  - job_name: prc-clubs
    metrics_path: /metrics
    static_configs:
      - targets: ['club-service:9502']
    relabel_configs:
      - target_label: service
        replacement: club-service
      - target_label: environment
        replacement: production

  - job_name: prc-races
    metrics_path: /metrics
    static_configs:
      - targets: ['race-service:9503']
    relabel_configs:
      - target_label: service
        replacement: race-service
      - target_label: environment
        replacement: production

  - job_name: prc-federation
    metrics_path: /metrics
    static_configs:
      - targets: ['federation-service:9504']
    relabel_configs:
      - target_label: service
        replacement: federation-service
      - target_label: environment
        replacement: production

  - job_name: prc-rendering
    metrics_path: /metrics
    static_configs:
      - targets: ['rendering-service:9505']
    relabel_configs:
      - target_label: service
        replacement: rendering-service
      - target_label: environment
        replacement: production

  - job_name: prc-integration
    metrics_path: /metrics
    static_configs:
      - targets: ['integration-service:9506']
    relabel_configs:
      - target_label: service
        replacement: integration-service
      - target_label: environment
        replacement: production

  - job_name: prc-admin
    metrics_path: /metrics
    static_configs:
      - targets: ['admin-service:9507']
    relabel_configs:
      - target_label: service
        replacement: admin-service
      - target_label: environment
        replacement: production

  - job_name: prc-public
    metrics_path: /metrics
    static_configs:
      - targets: ['public-service:9508']
    relabel_configs:
      - target_label: service
        replacement: public-service
      - target_label: environment
        replacement: production

  - job_name: prc-subscriptions
    metrics_path: /metrics
    static_configs:
      - targets: ['subscription-service:9509']
    relabel_configs:
      - target_label: service
        replacement: subscription-service
      - target_label: environment
        replacement: production

  # ── RabbitMQ (prometheus plugin on port 15692) ────────────────────────────────
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ['rabbitmq:15692']
    relabel_configs:
      - target_label: service
        replacement: rabbitmq
      - target_label: environment
        replacement: production

  # ── Node Exporter — host metrics ─────────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - target_label: service
        replacement: host
    metric_relabel_configs:
      # Keep only the most useful filesystem metrics
      - source_labels: [__name__, mountpoint]
        regex: "node_filesystem.*;/var/lib/docker"
        action: drop

  # ── cAdvisor — Docker container metrics ──────────────────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - target_label: service
        replacement: cadvisor
    metric_relabel_configs:
      # Only keep containers that belong to our stack
      - source_labels: [container_label_service]
        regex: "pigeon-.*|prometheus|grafana|loki|promtail|alertmanager|node-exporter|cadvisor|redis-exporter|postgres-exporter"
        action: keep
      # Drop empty container names (pause containers etc)
      - source_labels: [name]
        regex: ".+"
        action: keep

  # ── Redis Exporter ────────────────────────────────────────────────────────────
  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - target_label: service
        replacement: redis

  # ── SQL Server (via sql_exporter or postgres_exporter compat) ─────────────────
  - job_name: sqlserver-exporter
    static_configs:
      - targets: ['sql-exporter:9399']
    relabel_configs:
      - target_label: service
        replacement: sqlserver

  # ── Alertmanager self-monitoring ──────────────────────────────────────────────
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
    relabel_configs:
      - target_label: service
        replacement: alertmanager

  # ── Grafana self-monitoring ───────────────────────────────────────────────────
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: grafana

  # ── Loki self-monitoring ──────────────────────────────────────────────────────
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: loki
