# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.prod.yml  —  PRODUCTION overrides
#
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  Adds: resource limits, stricter restart policies, closed dev ports
# ─────────────────────────────────────────────────────────────────────────────

name: prc

services:

  rabbitmq:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.2", memory: 128M }

  sqlserver:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "4.0", memory: 4G }
        reservations: { cpus: "1.0", memory: 2G }

  redis:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }

  seq:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  api-gateway:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }

  identity-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.2", memory: 128M }

  club-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.2", memory: 128M }

  race-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1G }
        reservations: { cpus: "0.3", memory: 256M }

  federation-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.2", memory: 128M }

  rendering-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1G }
        reservations: { cpus: "0.3", memory: 256M }

  integration-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }

  admin-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }

  subscription-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }

  notification-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }

  public-service:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }

  prometheus:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2G }

  grafana:
    restart: always
    environment:
      GF_LOG_LEVEL: warn
      GF_SERVER_ENABLE_GZIP: "true"
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  loki:
    restart: always
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }

  promtail:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }

  alertmanager:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }

  node-exporter:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.1", memory: 64M }

  cadvisor:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }

  redis-exporter:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.1", memory: 32M }

  sql-exporter:
    restart: always
    deploy:
      resources:
        limits: { cpus: "0.1", memory: 32M }
