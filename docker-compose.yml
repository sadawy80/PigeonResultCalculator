name: prc

# ─────────────────────────────────────────────────────────────────────────────
#  Pigeon Result Calculator — Microservices Stack
#
#  Infrastructure:  rabbitmq, sqlserver, redis, seq
#  Services:        api-gateway + 9 domain services + notification worker
#  Observability:   prometheus, grafana, loki, promtail, alertmanager
#
#  Multi-arch (linux/amd64 + linux/arm64):
#    All .NET service images use mcr.microsoft.com/dotnet/{sdk,aspnet}:9.0-alpine
#    which ship multi-arch manifests. RenderingService stays on the debian-based
#    aspnet:9.0 image (Chromium + fonts) — also multi-arch via apt.
#
#    Single-arch host build (default — matches the host CPU):
#      docker compose build
#
#    Cross-build for ARM64 from an x86_64 dev box (requires QEMU + buildx):
#      docker buildx create --use --name prc-builder           # one-time
#      docker buildx bake -f docker-compose.yml --set "*.platform=linux/arm64" --load
#
#    Multi-arch publish (push both archs in one manifest):
#      docker buildx bake -f docker-compose.yml \
#        --set "*.platform=linux/amd64,linux/arm64" --push
# ─────────────────────────────────────────────────────────────────────────────

x-svc-env: &svc-env
  ASPNETCORE_ENVIRONMENT: Production
  RabbitMQ__Host: rabbitmq
  RabbitMQ__Username: ${RABBITMQ_USER:-guest}
  RabbitMQ__Password: ${RABBITMQ_PASS:-guest}
  Seq__ServerUrl: http://seq:5341
  Serilog__SeqUrl: http://seq:5341
  Jwt__Key: ${JWT_KEY:-CHANGE_THIS_TO_A_STRONG_SECRET_KEY_MIN_32_CHARS}
  Jwt__Issuer: PRC
  Jwt__Audience: PRC
  Consul__Address: http://consul:8500
  Serilog__MinimumLevel__Override__MassTransit: Warning
  App__FrontendUrl: https://localhost:4300
  # ── .NET runtime memory tuning (applies to every PRC service) ───────────────
  #   GCDynamicAdaptationMode=1 → DATAS: server-GC heap auto-tunes to container limit
  #   GCConserveMemory=9       → most aggressive heap shrinkage (range 0-9)
  #   TieredPGO=1              → dynamic profile-guided JIT (default in .NET 9, explicit here)
  DOTNET_GCDynamicAdaptationMode: "1"
  DOTNET_GCConserveMemory: "9"
  DOTNET_TieredPGO: "1"

# Shared resource cap for every .NET microservice. 512M is plenty for a
# right-sized ASP.NET Core process at idle (~60-150M) and leaves headroom
# for bursts. Honored by docker-compose v2 in both swarm and non-swarm
# modes; per-service overrides in docker-compose.prod.yml take precedence.
x-svc-resources: &svc-resources
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 96M

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: prc-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692" # Prometheus metrics
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./monitoring/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    logging: *default-logging

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prc-sqlserver
    restart: unless-stopped
    ports:
      - "1434:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_PASSWORD:-Str0ngP@ssword!}
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SQL_PASSWORD:-Str0ngP@ssword!}", "-Q", "SELECT 1", "-No" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  adminer:
    image: adminer:4-standalone
    container_name: prc-adminer
    restart: unless-stopped
    ports:
      - "7080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: sqlserver
    depends_on:
      sqlserver: { condition: service_healthy }
    networks:
      - internal
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: prc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  seq:
    image: datalust/seq:2024.3
    container_name: prc-seq
    restart: unless-stopped
    ports:
      - "5342:80"
      - "5541:5341"
    environment:
      ACCEPT_EULA: Y
    volumes:
      - seq_data:/data
    networks:
      - internal
    logging: *default-logging

  consul:
    image: hashicorp/consul:1.19
    container_name: prc-consul
    restart: unless-stopped
    ports:
      - "7500:8500"   # Consul UI
    command: "agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -data-dir=/consul/data"
    volumes:
      - consul_data:/consul/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ── Application Services ─────────────────────────────────────────────────────

  api-gateway:
    build:
      context: backend
      dockerfile: ApiGateway/Dockerfile
    container_name: prc-api-gateway
    restart: unless-stopped
    ports:
      - "9500:9500"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9500
      App__FrontendUrl: ${FRONTEND_URL:-https://localhost:4300}
    depends_on:
      rabbitmq: { condition: service_healthy }
      consul: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: api-gateway
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9500" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  identity-service:
    build:
      context: backend
      dockerfile: IdentityService/Dockerfile
    container_name: prc-identity
    restart: unless-stopped
    ports:
      - "9501:9501"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9501
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Identity;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: identity-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9501" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  club-service:
    build:
      context: backend
      dockerfile: ClubService/Dockerfile
    container_name: prc-clubs
    restart: unless-stopped
    ports:
      - "9502:9502"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9502
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Club;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
      FileService__BaseUrl: http://file-service:9512
      ServiceConfig__InternalApiKey: ${INTERNAL_API_KEY:-CHANGE_THIS_INTERNAL_SERVICE_KEY}
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: club-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9502" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  race-service:
    build:
      context: backend
      dockerfile: RaceService/Dockerfile
    container_name: prc-races
    restart: unless-stopped
    ports:
      - "9503:9503"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9503
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Race;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: race-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9503" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  federation-service:
    build:
      context: backend
      dockerfile: FederationService/Dockerfile
    container_name: prc-federation
    restart: unless-stopped
    ports:
      - "9504:9504"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9504
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Federation;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
      FileService__BaseUrl: http://file-service:9512
      ServiceConfig__InternalApiKey: ${INTERNAL_API_KEY:-CHANGE_THIS_INTERNAL_SERVICE_KEY}
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: federation-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9504" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  rendering-service:
    build:
      context: backend
      dockerfile: RenderingService/Dockerfile
    container_name: prc-rendering
    restart: unless-stopped
    ports:
      - "9505:9505"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9505
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Rendering;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: rendering-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9505" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  integration-service:
    build:
      context: backend
      dockerfile: IntegrationService/Dockerfile
    container_name: prc-integration
    restart: unless-stopped
    ports:
      - "9506:9506"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9506
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Integration;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: integration-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9506" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  admin-service:
    build:
      context: backend
      dockerfile: AdminService/Dockerfile
    container_name: prc-admin
    restart: unless-stopped
    ports:
      - "9507:9507"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9507
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Admin;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
      Jwt__AdminKey: ${ADMIN_JWT_KEY:-CHANGE_THIS_ADMIN_SECRET_KEY_MIN_32_CHARS}
      Jwt__AdminIssuer: PRC.AdminService
      Jwt__AdminAudience: PRC.Admin
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: admin-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9507" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  subscription-service:
    build:
      context: backend
      dockerfile: SubscriptionService/Dockerfile
    container_name: prc-subscriptions
    restart: unless-stopped
    ports:
      - "9509:9509"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9509
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Subscription;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: subscription-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9509" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  backup-service:
    build:
      context: backend
      dockerfile: BackupService/Dockerfile
    container_name: prc-backups
    restart: unless-stopped
    ports:
      - "9510:9510"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9510
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Backup;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
      ConnectionStrings__MasterConnection: "Server=sqlserver,1433;Database=master;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
      FileService__BaseUrl: http://file-service:9512
      ServiceConfig__InternalApiKey: ${INTERNAL_API_KEY:-CHANGE_THIS_INTERNAL_SERVICE_KEY}
      PCloud__AccessToken: ${PCLOUD_TOKEN:-}
      Backup__StagingPath: /sqldata/backup
      Backup__RetentionDays: "30"
      Jwt__AdminKey: ${ADMIN_JWT_KEY:-CHANGE_THIS_ADMIN_SECRET_KEY_MIN_32_CHARS}
      Jwt__AdminIssuer: PRC.AdminService
      Jwt__AdminAudience: PRC.Admin
    volumes:
      - sqlserver_data:/sqldata
    depends_on:
      sqlserver: { condition: service_healthy }
      file-service: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: backup-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9510" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  file-service:
    build:
      context: backend
      dockerfile: FileService/Dockerfile
    container_name: prc-files
    restart: unless-stopped
    ports:
      - "9512:9512"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9512
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      Minio__Bucket: pigeon-files
      Minio__PrivateBucket: pigeon-private
      Minio__UseSsl: "false"
      Minio__PublicUrl: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      ServiceConfig__InternalApiKey: ${INTERNAL_API_KEY:-CHANGE_THIS_INTERNAL_SERVICE_KEY}
    depends_on:
      minio: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: file-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9512" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  audit-service:
    build:
      context: backend
      dockerfile: AuditService/Dockerfile
    container_name: prc-audit
    restart: unless-stopped
    ports:
      - "9511:9511"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9511
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PRC_Audit;User Id=sa;Password=${SQL_PASSWORD:-Str0ngP@ssword!};TrustServerCertificate=True;"
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: audit-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9511" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  notification-service:
    build:
      context: backend
      dockerfile: NotificationService/Dockerfile
    container_name: prc-notifications
    restart: unless-stopped
    <<: *svc-resources
    environment:
      <<: *svc-env
      Email__Host: ${SMTP_HOST:-localhost}
      Email__Port: ${SMTP_PORT:-587}
      Email__From: ${SMTP_FROM:-noreply@pigeonresultcalculator.com}
      Email__Username: ${SMTP_USER:-}
      Email__Password: ${SMTP_PASSWORD:-}
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: notification-service
    logging: *default-logging

  public-service:
    build:
      context: backend
      dockerfile: PublicService/Dockerfile
    container_name: prc-public
    restart: unless-stopped
    ports:
      - "9508:9508"
    <<: *svc-resources
    environment:
      <<: *svc-env
      ASPNETCORE_URLS: http://+:9508
      App__FrontendUrl: ${FRONTEND_URL:-https://localhost:4300}
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks:
      - internal
    labels:
      logging: promtail
      service: public-service
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9508" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: prc-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.1.0
    container_name: prc-grafana
    restart: unless-stopped
    ports:
      - "7000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/01-platform-overview.json
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/placeholder/placeholder/placeholder}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - internal
    logging: *default-logging

  loki:
    image: grafana/loki:3.1.0
    container_name: prc-loki
    restart: unless-stopped
    ports:
      - "7100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - internal
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.1.0
    container_name: prc-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    networks:
      - internal
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: prc-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    environment:
      SMTP_SMARTHOST: ${SMTP_SMARTHOST:-smtp.gmail.com:587}
      SMTP_FROM: ${SMTP_FROM:-alerts@pigeonresultcalculator.com}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-ops@pigeonresultcalculator.com}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_KEY: ${PAGERDUTY_KEY:-}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - internal
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: prc-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - internal
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: prc-cadvisor
    restart: unless-stopped
    ports:
      - "9082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - internal
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: prc-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
    networks:
      - internal
    logging: *default-logging

  sql-exporter:
    image: burningalchemist/sql_exporter:0.14.3
    container_name: prc-sql-exporter
    restart: unless-stopped
    ports:
      - "9399:9399"
    command: --config.file=/etc/sql_exporter/sql_exporter.yml
    environment:
      SQL_PASSWORD: ${SQL_PASSWORD:-Str0ngP@ssword!}
    volumes:
      - ./monitoring/sql_exporter/sql_exporter.yml:/etc/sql_exporter/sql_exporter.yml:ro
    depends_on:
      sqlserver: { condition: service_healthy }
    networks:
      - internal
    logging: *default-logging

# ── Networks / Volumes ────────────────────────────────────────────────────────

networks:
  internal:
    driver: bridge

volumes:
  rabbitmq_data:
  sqlserver_data:
  redis_data:
  seq_data:
  consul_data:
  prometheus_data:
  grafana_data:
  loki_data:
  minio_data:
