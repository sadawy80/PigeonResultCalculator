<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Best Loft Result</title>
<!--
  PRODUCTION BEST LOFT RESULT — Portrait A4 multi-page, EN+AR, 13 designs.
  Each fancier row contains N sub-rows (one per race result) plus a Total Points value.
  Differs from Ace: NO Pigeon column (loft-level not bird-level), "Points" instead of "Coeffi.".
  Data-driven. See BESTLOFT_RESULT_PROD_SPEC.md for the JSON contract.

  Data sources (priority order):
    1. ?data_url=<absolute-url>     — fetched as JSON
    2. ?data=<base64-json>          — inline
    3. window.BESTLOFT_DATA = {...}      — preferred for headless
    4. window.postMessage({type:'bestloft_data', payload:{...}})

  Config:
    ?design=L1..L10|AR-L1..AR-L3   ?lang=en|ar   ?print=1
    window.BESTLOFT_DESIGN, window.BESTLOFT_LANG, window.BESTLOFT_AUTOPRINT
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;700;900&family=Cinzel:wght@400;600;800&family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,800&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;700;800&family=Marcellus&family=Noto+Naskh+Arabic:wght@400;500;700&family=Playfair+Display:wght@400;700;900&family=Reem+Kufi:wght@400;500;700&family=Scheherazade+New:wght@400;500;700&family=Syne:wght@500;700;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #888; font-family: 'DM Sans', sans-serif; color: #222; min-height: 100vh; }
  .preview-wrap { padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

  /* A4 portrait page */
  .page { width: 794px; height: 1123px; background: var(--ar-bg, #fff); color: var(--ar-text, #222); box-shadow: 0 4px 24px rgba(0,0,0,.4); display: flex; flex-direction: column; overflow: hidden; font-family: var(--ar-font-body, 'DM Sans', sans-serif); position: relative; flex-shrink: 0; }
  @media (max-width: 900px) { .page { width: 100%; max-width: 794px; } }

  /* Header */
  .ar-header { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: 14px; padding: 18px 30px 12px; border-bottom: 1px solid var(--ar-accent, #333); position: relative; z-index: 1; flex-shrink: 0; }
  .ar-logo { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .ar-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .ar-title-block { text-align: center; min-width: 0; }
  .ar-org { font-family: var(--ar-font-display, 'Playfair Display', serif); font-size: 18px; font-weight: 700; color: var(--ar-text, #222); line-height: 1.2; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ar-eyebrow { font-size: 11px; color: var(--ar-accent, #666); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .ar-race-name { font-family: var(--ar-font-display, 'Playfair Display', serif); font-size: 14px; font-weight: 600; color: var(--ar-accent, #666); letter-spacing: 1.5px; }
  .lang-ar .ar-org, .lang-ar .ar-race-name { font-family: var(--ar-font-display-rtl, 'Aref Ruqaa', 'Amiri', 'Noto Naskh Arabic', serif); }
  .ar-qr { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
  .ar-qr canvas, .ar-qr img { max-width: 100%; max-height: 100%; display: block; background: #fff; padding: 2px; border: 1px solid var(--ar-accent, #333); border-radius: 2px; }

  /* Remarks bar */
  .ar-remarks { padding: 6px 30px; font-size: 10px; background: var(--ar-stripe, rgba(0,0,0,.03)); color: var(--ar-muted, #666); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ar-rule, rgba(0,0,0,.1)); position: relative; z-index: 1; flex-shrink: 0; }
  .ar-remarks-label { font-size: 9px; color: var(--ar-text, #222); font-weight: 600; }
  .ar-page-num { font-size: 9px; color: var(--ar-muted, #999); font-weight: 600; }

  /* Table */
  .ar-table-wrap { flex: 1; padding: 8px 22px; position: relative; z-index: 1; overflow: hidden; }
  .ar-table { width: 100%; border-collapse: collapse; font-size: 10px; line-height: 1.3; }
  .ar-table thead th { background: var(--ar-head-bg, #1a1a1a); color: var(--ar-head-text, #fff); padding: 8px 5px; text-align: center; font-size: 9.5px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; border: 1px solid var(--ar-head-bg, #1a1a1a); }
  .ar-table tbody td { padding: 5px; border: 1px solid var(--ar-rule, #ddd); text-align: center; vertical-align: middle; }
  .ar-table tbody tr.fancier-row > td { font-weight: 600; }

  /* Column widths — Ace schema (with Pigeon column) */
  .ar-table th.col-pos, .ar-table td.col-pos { width: 6%; font-weight: 700; font-family: var(--ar-font-display, 'Playfair Display', serif); font-size: 12px; color: var(--ar-accent, #222); }
  .ar-table th.col-fancier, .ar-table td.col-fancier { width: 30%; text-align: start; padding-inline-start: 8px; font-weight: 600; }
  .ar-table th.col-pigeon, .ar-table td.col-pigeon { width: 14%; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: .3px; direction: ltr; }
  .ar-table th.col-nprize, .ar-table td.col-nprize { width: 8%; font-size: 10px; }
  .ar-table th.col-race, .ar-table td.col-race { width: 14%; font-size: 10px; }
  .ar-table th.col-postotal, .ar-table td.col-postotal { width: 11%; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; direction: ltr; }
  .ar-table th.col-coeffi, .ar-table td.col-coeffi { width: 10%; font-family: 'JetBrains Mono', monospace; font-size: 10px; direction: ltr; }
  .ar-table th.col-totalcoeffi, .ar-table td.col-totalcoeffi { width: 15%; font-family: var(--ar-font-display, 'Playfair Display', serif); font-size: 12px; font-weight: 700; color: var(--ar-accent, #222); direction: ltr; }

  /* Sub-row cells (inside the per-fancier rowspan group) */
  .ar-table td.sub-race { width: 14%; text-align: center; font-size: 9.5px; }
  .ar-table td.sub-pt { width: 11%; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; direction: ltr; }
  .ar-table td.sub-coef { width: 10%; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; direction: ltr; }
  /* Cells that span multiple sub-rows */
  .ar-table td.col-pos, .ar-table td.col-fancier, .ar-table td.col-pigeon,
  .ar-table td.col-nprize, .ar-table td.col-totalcoeffi { vertical-align: middle; }

  /* Podium */
  /* Podium — applies to both the fancier-row (first sub-row) and continuation sub-rows */
  .ar-table tbody tr.podium-1 > td { background: var(--ar-gold-bg, linear-gradient(90deg, rgba(212,175,90,.18), rgba(212,175,90,.06))); }
  .ar-table tbody tr.podium-2 > td { background: var(--ar-silver-bg, linear-gradient(90deg, rgba(180,180,190,.18), rgba(180,180,190,.06))); }
  .ar-table tbody tr.podium-3 > td { background: var(--ar-bronze-bg, linear-gradient(90deg, rgba(168,107,58,.15), rgba(168,107,58,.04))); }
  .ar-table tbody tr.podium-1 td.col-pos { color: var(--ar-gold, #b8862a); font-size: 14px; }
  .ar-table tbody tr.podium-2 td.col-pos { color: var(--ar-silver, #787880); }
  .ar-table tbody tr.podium-3 td.col-pos { color: var(--ar-bronze, #a86b3a); }
  .ar-table tbody tr.podium-1 td.col-pos::before { content: "🥇 "; }
  .ar-table tbody tr.podium-2 td.col-pos::before { content: "🥈 "; }
  .ar-table tbody tr.podium-3 td.col-pos::before { content: "🥉 "; }
  .no-podium .ar-table tbody tr.podium-1 > td,
  .no-podium .ar-table tbody tr.podium-2 > td,
  .no-podium .ar-table tbody tr.podium-3 > td { background: initial; }
  .no-podium .ar-table tbody tr td.col-pos::before { content: ""; }

  /* Footer */
  .ar-footer { padding: 8px 30px; font-size: 9px; border-top: 1px solid var(--ar-accent, #333); display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; gap: 12px; color: var(--ar-muted, #666); position: relative; z-index: 1; flex-shrink: 0; }
  .ar-footer-left { text-align: start; font-family: var(--ar-font-display, 'Playfair Display', serif); font-size: 10px; font-weight: 600; color: var(--ar-text, #222); }
  .ar-footer-center { text-align: center; font-size: 9px; letter-spacing: 1px; }
  .ar-footer-right { text-align: end; font-family: 'JetBrains Mono', monospace; font-size: 9px; }

  /* RTL */
  .page.lang-ar { direction: rtl; font-family: var(--ar-font-body-rtl, 'Tajawal', sans-serif); }
  .page.lang-ar .ar-table { direction: rtl; }

  /* Design variants (same families as race results T1..T10 renamed A1..L10, AR-A1..AR-A3) */
  .L1 { --ar-bg:#fdfbf4; --ar-text:#2a1f12; --ar-accent:#6b4a25; --ar-muted:#8a6a3a; --ar-rule:#d4b878; --ar-stripe:rgba(107,74,37,.04); --ar-head-bg:#2a1f12; --ar-head-text:#f4ecd8; --ar-font-display:'Cormorant Garamond',serif; }
  .L1::before { content:""; position:absolute; inset:8px; border:1px solid #c4a878; pointer-events:none; z-index:0; }

  .L2 { --ar-bg:#0a1428; --ar-text:#f4dfa3; --ar-accent:#d4af5a; --ar-muted:#c8a85a; --ar-rule:rgba(212,175,90,.3); --ar-stripe:rgba(212,175,90,.05); --ar-head-bg:#d4af5a; --ar-head-text:#0a1428; --ar-font-display:'Cinzel',serif; --ar-gold-bg:linear-gradient(90deg,rgba(244,223,163,.22),rgba(244,223,163,.06)); }
  .L2::before { content:""; position:absolute; inset:10px; border:1px solid #d4af5a; pointer-events:none; z-index:0; opacity:.5; }

  .L3 { --ar-bg:#fff; --ar-text:#0a0a0a; --ar-accent:#0a0a0a; --ar-muted:#666; --ar-rule:#ddd; --ar-stripe:#fafafa; --ar-head-bg:#0a0a0a; --ar-head-text:#fff; --ar-font-display:'Fraunces',serif; }

  .L4 { --ar-bg:#fafafa; --ar-text:#111; --ar-accent:#e8264a; --ar-muted:#888; --ar-rule:#e0e0e0; --ar-stripe:#fff; --ar-head-bg:#111; --ar-head-text:#fff; --ar-font-display:'Inter Tight',sans-serif; }
  .L4::before { content:""; position:absolute; top:0; left:0; width:5px; height:100%; background:#e8264a; z-index:0; }

  .L5 { --ar-bg:#0d1117; --ar-text:#f0f0f0; --ar-accent:#e8b923; --ar-muted:#aaa; --ar-rule:#1f2933; --ar-stripe:#161b22; --ar-head-bg:#e8b923; --ar-head-text:#0d1117; --ar-font-display:'Inter Tight',sans-serif; }

  .L6 { --ar-bg:#fff; --ar-text:#0a0a0a; --ar-accent:#0066ff; --ar-muted:#666; --ar-rule:#e8e8e8; --ar-stripe:#f6f9ff; --ar-head-bg:#0066ff; --ar-head-text:#fff; --ar-font-display:'Inter Tight',sans-serif; }
  .L6 .ar-org { font-weight:800; letter-spacing:-.5px; }

  .L7 { --ar-bg:#1c1410; --ar-text:#e8c878; --ar-accent:#d4a951; --ar-muted:#a88858; --ar-rule:rgba(212,169,81,.3); --ar-stripe:rgba(212,169,81,.05); --ar-head-bg:#d4a951; --ar-head-text:#1c1410; --ar-font-display:'Marcellus',serif; }
  .L7::before { content:""; position:absolute; inset:8px; border:2px solid #d4a951; pointer-events:none; z-index:0; }

  .L8 { --ar-bg:#2a0a14; --ar-text:#f4e0c0; --ar-accent:#d4a060; --ar-muted:#c89868; --ar-rule:rgba(212,160,96,.25); --ar-stripe:rgba(212,160,96,.05); --ar-head-bg:#d4a060; --ar-head-text:#2a0a14; --ar-font-display:'Cinzel',serif; background:linear-gradient(180deg,#3a0f1a 0%,#2a0a14 100%); }

  .L9 { --ar-bg:#1a1a1f; --ar-text:#f0f0f5; --ar-accent:#b8c0c8; --ar-muted:#aaa; --ar-rule:#2a2a30; --ar-stripe:#22222a; --ar-head-bg:#b8c0c8; --ar-head-text:#1a1a1f; --ar-font-display:'Syne',sans-serif; }

  .L10 { --ar-bg:#fafafa; --ar-text:#0a0a0a; --ar-accent:#0a4d2e; --ar-muted:#666; --ar-rule:#ddd; --ar-stripe:rgba(10,77,46,.04); --ar-head-bg:#0a4d2e; --ar-head-text:#fff; --ar-font-display:'Manrope',sans-serif; }

  /* Arabic */
  .ARL1 { --ar-bg:#0a2818; --ar-text:#f4e6b8; --ar-accent:#d4af5a; --ar-muted:#b09a5a; --ar-rule:rgba(212,175,90,.25); --ar-stripe:rgba(212,175,90,.05); --ar-head-bg:#d4af5a; --ar-head-text:#0a2818; --ar-font-display:'Aref Ruqaa','Amiri','Noto Naskh Arabic',serif; --ar-font-display-rtl:'Aref Ruqaa','Amiri','Noto Naskh Arabic',serif; --ar-font-body-rtl:'Tajawal','Cairo',sans-serif; }
  .ARL1::before { content:""; position:absolute; inset:10px; border:2px solid #d4af5a; pointer-events:none; z-index:0; }
  .ARL1::after { content:""; position:absolute; inset:14px; border:1px solid rgba(212,175,90,.4); pointer-events:none; z-index:0; }

  .ARL2 { --ar-bg:#faf3e3; --ar-text:#3a2418; --ar-accent:#8a5a18; --ar-muted:#a88858; --ar-rule:#c4a878; --ar-stripe:#fff8e8; --ar-head-bg:#3a2418; --ar-head-text:#faf3e3; --ar-font-display:'Aref Ruqaa','Amiri','Noto Naskh Arabic',serif; --ar-font-display-rtl:'Aref Ruqaa','Amiri','Noto Naskh Arabic',serif; --ar-font-body:'Scheherazade New','Amiri',serif; --ar-font-body-rtl:'Scheherazade New','Amiri',serif; }
  .ARL2::before { content:""; position:absolute; inset:12px; border:1px solid #8a5a18; pointer-events:none; z-index:0; }

  .ARL3 { --ar-bg:#f5f2e8; --ar-text:#0f3a3a; --ar-accent:#0f3a3a; --ar-muted:#5a7a7a; --ar-rule:#a8c4c4; --ar-stripe:#fff; --ar-head-bg:#0f3a3a; --ar-head-text:#f5f2e8; --ar-font-display:'Reem Kufi',sans-serif; --ar-font-display-rtl:'Reem Kufi',sans-serif; --ar-font-body:'Cairo','Tajawal',sans-serif; --ar-font-body-rtl:'Cairo','Tajawal',sans-serif; }

  /* Error */
  .ar-error { padding: 60px 30px; text-align: center; font-family: 'DM Sans', sans-serif; }
  .ar-error h1 { font-size: 22px; margin-bottom: 14px; color: #c8262a; }
  .ar-error p { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 10px; }
  .ar-error .example { text-align: left; max-width: 600px; margin: 18px auto 0; background: #0d1117; color: #e8e8e8; padding: 14px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.5; overflow-x: auto; white-space: pre; }

  @media print {
    *, *::before, *::after { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    @page { size: A4 portrait; margin: 0; }
    html, body { background: #fff; }
    .preview-wrap { padding: 0; display: block; background: #fff; }
    .page { margin: 0; box-shadow: none; page-break-after: always; width: 210mm; height: 297mm; }
    .page:last-child { page-break-after: auto; }
  }
</style>
</head>
<body data-render-status="rendering">
<div class="preview-wrap" id="previewWrap"></div>

<script>
const VALID_DESIGNS = new Set(['L1','L2','L3','L4','L5','L6','L7','L8','L9','L10','AR-L1','AR-L2','AR-L3']);
const VALID_LANGS = new Set(['en','ar']);

const DEFAULT_I18N = {
  en: { col_pos:"Pos.", col_fancier:"Fancier Name", col_nprize:"No. Prizes", col_race:"Race Name", col_postotal:"Basketed / Total", col_coeffi:"Points", col_totalcoeffi:"Total Points", page:"Page", of:"of", remarks:"Remarks" },
  ar: { col_pos:"المركز", col_fancier:"أسم المتسابق", col_nprize:"عدد النتائج", col_race:"السباق", col_postotal:"المسلم / الكلي", col_coeffi:"النقاط", col_totalcoeffi:"مجموع النقاط", page:"صفحة", of:"من", remarks:"ملاحظات" }
};

function getParam(name) { return new URL(window.location.href).searchParams.get(name); }

function getConfig() {
  if (window.BESTLOFT_DESIGN || window.BESTLOFT_LANG) {
    return {
      design: (window.BESTLOFT_DESIGN && VALID_DESIGNS.has(window.BESTLOFT_DESIGN)) ? window.BESTLOFT_DESIGN : 'A1',
      lang:   (window.BESTLOFT_LANG && VALID_LANGS.has(window.BESTLOFT_LANG)) ? window.BESTLOFT_LANG : 'en',
      autoPrint: !!window.BESTLOFT_AUTOPRINT
    };
  }
  let design = getParam('design') || 'L1';
  if (!VALID_DESIGNS.has(design)) design = 'L1';
  let lang = getParam('lang') || 'en';
  if (!VALID_LANGS.has(lang)) lang = 'en';
  return { design, lang, autoPrint: getParam('print') === '1' };
}

async function loadData() {
  const dataUrl = getParam('data_url');
  if (dataUrl) {
    const res = await fetch(dataUrl, { credentials: 'omit' });
    if (!res.ok) throw new Error(`fetch data_url failed: HTTP ${res.status}`);
    return res.json();
  }
  const dataB64 = getParam('data');
  if (dataB64) {
    try { return JSON.parse(decodeURIComponent(escape(atob(dataB64)))); }
    catch (e) { throw new Error(`base64 data decode failed: ${e.message}`); }
  }
  if (window.BESTLOFT_DATA) return window.BESTLOFT_DATA;
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('No data source. Use ?data_url=, ?data=, window.BESTLOFT_DATA, or postMessage.'));
    }, 15000);
    function handler(ev) {
      if (ev.data && ev.data.type === 'bestloft_data' && ev.data.payload) {
        clearTimeout(timeout); window.removeEventListener('message', handler);
        resolve(ev.data.payload);
      }
    }
    window.addEventListener('message', handler);
  });
}

function langField(record, baseKey, lang, fallback = 'en') {
  if (!record) return '';
  for (const k of [`${baseKey}_${lang}`, baseKey, `${baseKey}_${fallback}`]) {
    if (record[k] !== undefined && record[k] !== null && record[k] !== '') return String(record[k]);
  }
  return '';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showError(title, detail, example) {
  document.body.dataset.renderStatus = 'error';
  document.body.dataset.errorMessage = detail || '';
  document.getElementById('previewWrap').innerHTML = `<div class="ar-error"><h1>${escapeHtml(title)}</h1><p>${escapeHtml(detail)}</p>${example ? `<div class="example">${escapeHtml(example)}</div>` : ''}</div>`;
}

function designToClass(d) { return d.replace(/-/g, ''); }

function buildPage(rows, pageNum, totalPages, config, data, t) {
  const designClass = designToClass(config.design);
  const isArabicDesign = config.design.startsWith('AR-');
  const lang = isArabicDesign ? 'ar' : config.lang;

  const meta = data.meta || {};
  const schema = data.schema || {};
  const showQR = schema.show_qr !== false;
  const showPodium = schema.show_podium !== false;
  const labels = data.labels || {};
  const lbl = (k, fallback) => langField(labels, k, lang) || fallback;

  const page = document.createElement('div');
  page.className = `page ${designClass} lang-${lang}${showPodium ? '' : ' no-podium'}`;

  // Header
  const header = document.createElement('div');
  header.className = 'ar-header';
  header.innerHTML = `
    <div class="ar-logo">${meta.logo_url ? `<img src="${escapeHtml(meta.logo_url)}" alt="">` : ''}</div>
    <div class="ar-title-block">
      <div class="ar-eyebrow"><bdi>${escapeHtml(langField(meta, 'eyebrow', lang) || (lang==='ar'?'نتيجة أفضل لوفت':'Best Loft Result'))}</bdi></div>
      <div class="ar-org"><bdi>${escapeHtml(langField(meta, 'org', lang))}</bdi></div>
      <div class="ar-race-name"><bdi>${escapeHtml(langField(meta, 'result_name', lang))}</bdi></div>
    </div>
    <div class="ar-qr">${showQR && meta.qr_content ? '<div class="qr-target"></div>' : ''}</div>
  `;
  page.appendChild(header);

  // Remarks bar
  const remarks = document.createElement('div');
  remarks.className = 'ar-remarks';
  remarks.innerHTML = `
    <div class="ar-remarks-label"><bdi>${escapeHtml(langField(meta, 'remarks', lang))}</bdi></div>
    <div class="ar-page-num">${escapeHtml(lbl('page', t.page))} ${pageNum} ${escapeHtml(lbl('of', t.of))} ${totalPages}</div>
  `;
  page.appendChild(remarks);

  // Table
  const tableWrap = document.createElement('div');
  tableWrap.className = 'ar-table-wrap';
  const table = document.createElement('table');
  table.className = 'ar-table';

  // Points/Coeffi schema toggle. If use_points is true, override the last two column labels.
  const useCoeffi = schema.use_coeffi === true;
  const coeffiLabelKey = 'col_coeffi';
  const totalLabelKey = 'col_totalcoeffi';
  const coeffiDefault = useCoeffi ? (lang === 'ar' ? 'المعامل' : 'Coeffi.') : t.col_coeffi;
  const totalDefault = useCoeffi ? (lang === 'ar' ? 'مجموع المعامل' : 'Total Coeffi.') : t.col_totalcoeffi;

  let headHtml = `<thead><tr>
    <th class="col-pos">${escapeHtml(lbl('col_pos', t.col_pos))}</th>
    <th class="col-fancier">${escapeHtml(lbl('col_fancier', t.col_fancier))}</th>
    <th class="col-nprize">${escapeHtml(lbl('col_nprize', t.col_nprize))}</th>
    <th class="sub-race">${escapeHtml(lbl('col_race', t.col_race))}</th>
    <th class="sub-pt">${escapeHtml(lbl('col_postotal', t.col_postotal))}</th>
    <th class="sub-coef">${escapeHtml(lbl(coeffiLabelKey, coeffiDefault))}</th>
    <th class="col-totalcoeffi">${escapeHtml(lbl(totalLabelKey, totalDefault))}</th>
  </tr></thead>`;

  let bodyHtml = '<tbody>';
  rows.forEach(r => {
    const pos = parseInt(r.pos) || 0;
    const podiumClass = (pos === 1) ? 'podium-1' : (pos === 2) ? 'podium-2' : (pos === 3) ? 'podium-3' : '';
    const races = r.races || [];
    const span = Math.max(1, races.length);  // rowspan must be ≥ 1
    const nPrizes = r.n_prizes ?? races.length;
    const totalValue = String(r.total_coeffi ?? r.total_points ?? '');

    if (races.length === 0) {
      // Fancier with no races — single row, no rowspan needed
      bodyHtml += `<tr class="fancier-row ${podiumClass}">
        <td class="col-pos">${escapeHtml(String(r.pos ?? ''))}</td>
        <td class="col-fancier"><bdi>${escapeHtml(langField(r, 'fancier', lang))}</bdi></td>
        <td class="col-nprize">${escapeHtml(String(nPrizes))}</td>
        <td class="sub-race">&nbsp;</td>
        <td class="sub-pt">&nbsp;</td>
        <td class="sub-coef">&nbsp;</td>
        <td class="col-totalcoeffi"><bdi>${escapeHtml(totalValue)}</bdi></td>
      </tr>`;
      return;
    }

    // First sub-row carries the rowspan'd cells for this fancier
    const firstRace = races[0];
    bodyHtml += `<tr class="fancier-row ${podiumClass}">
      <td class="col-pos" rowspan="${span}">${escapeHtml(String(r.pos ?? ''))}</td>
      <td class="col-fancier" rowspan="${span}"><bdi>${escapeHtml(langField(r, 'fancier', lang))}</bdi></td>
      <td class="col-nprize" rowspan="${span}">${escapeHtml(String(nPrizes))}</td>
      <td class="sub-race"><bdi>${escapeHtml(langField(firstRace, 'name', lang))}</bdi></td>
      <td class="sub-pt"><bdi>${escapeHtml(firstRace.pos_total || '')}</bdi></td>
      <td class="sub-coef"><bdi>${escapeHtml(String(firstRace.coeffi ?? firstRace.points ?? ''))}</bdi></td>
      <td class="col-totalcoeffi" rowspan="${span}"><bdi>${escapeHtml(totalValue)}</bdi></td>
    </tr>`;

    // Subsequent sub-rows — only race/pt/coef cells (others rowspan'd above)
    for (let i = 1; i < races.length; i++) {
      const rc = races[i];
      bodyHtml += `<tr class="sub-row ${podiumClass}">
        <td class="sub-race"><bdi>${escapeHtml(langField(rc, 'name', lang))}</bdi></td>
        <td class="sub-pt"><bdi>${escapeHtml(rc.pos_total || '')}</bdi></td>
        <td class="sub-coef"><bdi>${escapeHtml(String(rc.coeffi ?? rc.points ?? ''))}</bdi></td>
      </tr>`;
    }
  });
  bodyHtml += '</tbody>';

  table.innerHTML = headHtml + bodyHtml;
  tableWrap.appendChild(table);
  page.appendChild(tableWrap);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'ar-footer';
  footer.innerHTML = `
    <div class="ar-footer-left"><bdi>${escapeHtml(langField(meta, 'footer_left', lang))}</bdi></div>
    <div class="ar-footer-center"><bdi>${escapeHtml(langField(meta, 'footer_center', lang))}</bdi></div>
    <div class="ar-footer-right"><bdi>${escapeHtml(langField(meta, 'footer_right', lang))}</bdi> · ${escapeHtml(lbl('page', t.page))} ${pageNum}/${totalPages}</div>
  `;
  page.appendChild(footer);

  // QR
  if (showQR && meta.qr_content) {
    setTimeout(() => {
      const target = page.querySelector('.qr-target');
      if (!target) return;
      const accent = getComputedStyle(page).getPropertyValue('--ar-accent').trim() || '#000';
      new QRCode(target, { text: String(meta.qr_content), width: 72, height: 72, colorDark: accent, colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M });
    }, 0);
  }
  return page;
}

async function render(data, config) {
  const wrap = document.getElementById('previewWrap');
  wrap.innerHTML = '';
  const rows = data.rows || [];
  if (!rows.length) {
    showError('No rows to display', 'Your data has no `rows` array or it is empty.', null);
    return;
  }
  const rowsPerPage = (data.schema && data.schema.rows_per_page) || 9;
  const totalPages = Math.max(1, Math.ceil(rows.length / rowsPerPage));
  const lang = config.design.startsWith('AR-') ? 'ar' : config.lang;
  const t = DEFAULT_I18N[lang];

  for (let p = 0; p < totalPages; p++) {
    const slice = rows.slice(p * rowsPerPage, (p + 1) * rowsPerPage);
    wrap.appendChild(buildPage(slice, p + 1, totalPages, config, data, t));
  }

  try { await document.fonts.ready; } catch (e) {}
  document.body.dataset.renderStatus = 'complete';
  if (config.autoPrint) setTimeout(() => window.print(), 300);
}

async function init() {
  const config = getConfig();
  try {
    const data = await loadData();
    if (!data || typeof data !== 'object') throw new Error('Loaded data is not an object');
    await render(data, config);
  } catch (e) {
    showError('Cannot render Best Loft result', e.message, 'See BESTLOFT_RESULT_PROD_SPEC.md for the JSON schema.');
  }
}

init();
</script>
</body>
</html>
