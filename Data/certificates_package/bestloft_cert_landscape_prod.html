<script>
const VALID_DESIGNS = new Set(['L1L','L2L','L3L','L4L','L5L','L6L','L7L','L8L','L9L','L10L','AR-L1L','AR-L2L','AR-L3L']);
const VALID_LANGS = new Set(['en','ar']);

function getParam(name) { return new URL(window.location.href).searchParams.get(name); }

function getConfig() {
  if (window.CERT_DESIGN || window.CERT_LANG) {
    return {
      design: (window.CERT_DESIGN && VALID_DESIGNS.has(window.CERT_DESIGN)) ? window.CERT_DESIGN : 'R1L',
      lang:   (window.CERT_LANG && VALID_LANGS.has(window.CERT_LANG)) ? window.CERT_LANG : 'en',
      autoPrint: !!window.CERT_AUTOPRINT
    };
  }
  let design = getParam('design') || 'L1L';
  if (!VALID_DESIGNS.has(design)) design = 'L1L';
  let lang = getParam('lang') || 'en';
  if (!VALID_LANGS.has(lang)) lang = 'en';
  return { design, lang, autoPrint: getParam('print') === '1' };
}

async function loadData() {
  const dataUrl = getParam('data_url');
  if (dataUrl) {
    const res = await fetch(dataUrl, { credentials: 'omit' });
    if (!res.ok) throw new Error(`fetch data_url failed: HTTP ${res.status}`);
    return res.json();
  }
  const dataB64 = getParam('data');
  if (dataB64) {
    try { return JSON.parse(decodeURIComponent(escape(atob(dataB64)))); }
    catch (e) { throw new Error(`base64 data decode failed: ${e.message}`); }
  }
  if (window.CERT_DATA) return window.CERT_DATA;
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('No data source. Use ?data_url=, ?data=, window.CERT_DATA, or postMessage.'));
    }, 15000);
    function handler(ev) {
      if (ev.data && ev.data.type === 'cert_data' && ev.data.payload) {
        clearTimeout(timeout); window.removeEventListener('message', handler);
        resolve(ev.data.payload);
      }
    }
    window.addEventListener('message', handler);
  });
}

function langField(record, baseKey, lang, fallback = 'en') {
  if (!record) return '';
  for (const k of [`${baseKey}_${lang}`, baseKey, `${baseKey}_${fallback}`]) {
    if (record[k] !== undefined && record[k] !== null && record[k] !== '') return String(record[k]);
  }
  return '';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showError(title, detail, example) {
  document.body.dataset.renderStatus = 'error';
  document.body.dataset.errorMessage = detail || '';
  document.getElementById('previewWrap').innerHTML = `<div class="cert-error"><h1>${escapeHtml(title)}</h1><p>${escapeHtml(detail)}</p>${example ? `<div class="example">${escapeHtml(example)}</div>` : ''}</div>`;
}

function designToClass(d) { return d.replace(/-/g, ''); }

function buildSheet(data, config) {
  const designClass = designToClass(config.design);
  const isArabicDesign = config.design.startsWith('AR-');
  const lang = isArabicDesign ? 'ar' : config.lang;

  const meta    = data.meta    || {};
  const loft    = data.loft    || {};
  const bird    = data.bird    || {};
  const stats   = data.stats   || {};
  const metaRow = data.meta_row|| {};
  const sigL    = data.sig_left  || {};
  const sigR    = data.sig_right || {};
  const schema  = data.schema  || {};
  const labels  = data.labels  || {};
  const showFederation = schema.show_federation !== false;
  const showQR   = schema.show_qr   !== false;
  const lbl = (k, fallback) => langField(labels, k, lang) || fallback;

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.innerHTML = `
    <div class="cert ${designClass} lang-${lang}">
      ${isArabicDesign ? '<div class="arabesque-bg"></div>' : ''}
      <div class="cert-header">
        <div class="cert-logo">${meta.logo_url ? `<img src="${escapeHtml(meta.logo_url)}" alt="">` : ''}</div>
        <div class="cert-title-block">
          <div class="cert-eyebrow"><bdi>${escapeHtml(langField(meta, 'eyebrow', lang))}</bdi></div>
          <div class="cert-title"><bdi>${escapeHtml(langField(meta, 'title', lang) || 'Best Loft')}</bdi></div>
          <div class="cert-subtitle"><bdi>${escapeHtml(langField(meta, 'subtitle', lang))}</bdi></div>
        </div>
        <div></div>
      </div>
      ${showFederation ? `
      <div class="cert-loft">
        <span class="cert-loft-name"><bdi>${escapeHtml(langField(data.federation || {}, 'name', lang))}</bdi></span>
        <span><bdi>${escapeHtml(langField(data.federation || {}, 'region', lang))}</bdi></span><span class="sep">·</span>
        <span><bdi>${escapeHtml(langField(data.federation || {}, 'season', lang))}</bdi></span><span class="sep">·</span>
        <span><bdi>${escapeHtml((data.federation || {}).phone || '')}</bdi></span><span class="sep">·</span>
        <span><bdi>${escapeHtml((data.federation || {}).email || '')}</bdi></span>
      </div>` : ''}
      <div class="cert-body">
        <div class="cert-hero">
          <div class="cert-awarded-to"><bdi>${escapeHtml(langField(meta, 'awarded_to', lang) || (lang==='ar'?'تُمنح إلى':'Awarded to'))}</bdi></div>
          <div class="cert-bird-name"><bdi>${escapeHtml(langField(data.loft || {}, 'name', lang))}</bdi></div>
          <div class="cert-bird-ring"><bdi>${escapeHtml((data.loft || {}).established || '')}</bdi></div>
          <div class="cert-citation"><bdi>${escapeHtml(langField(meta, 'citation', lang))}</bdi></div>
        </div>
        <div class="cert-stats-zone">
          <div class="cert-stats">
            <div class="cert-stat"><div class="cert-stat-value"><bdi>${escapeHtml(stats.position || '')}</bdi></div><div class="cert-stat-label">${escapeHtml(lbl('position', lang==='ar'?'المركز':'Position'))}</div></div>
            <div class="cert-stat"><div class="cert-stat-value"><bdi>${escapeHtml(stats.velocity || '')}</bdi></div><div class="cert-stat-label">${escapeHtml(lbl('velocity', lang==='ar'?'السرعة':'Velocity'))}</div></div>
            <div class="cert-stat"><div class="cert-stat-value"><bdi>${escapeHtml(stats.distance || '')}</bdi></div><div class="cert-stat-label">${escapeHtml(lbl('distance', lang==='ar'?'المسافة':'Distance'))}</div></div>
            <div class="cert-stat"><div class="cert-stat-value"><bdi>${escapeHtml(stats.time || '')}</bdi></div><div class="cert-stat-label">${escapeHtml(lbl('time', lang==='ar'?'الزمن':'Time'))}</div></div>
          </div>
          <div class="cert-meta-row">
            <span><b>${escapeHtml(lbl('races_participated', lang==='ar'?'السباقات:':'Races:'))}</b><bdi>${escapeHtml(langField(metaRow, 'races_participated', lang))}</bdi></span>
            <span><b>${escapeHtml(lbl('national_wins', lang==='ar'?'الفوز:':'Wins:'))}</b><bdi>${escapeHtml(langField(metaRow, 'national_wins', lang) || metaRow.national_wins || '')}</bdi></span>
            <span><b>${escapeHtml(lbl('notes', lang==='ar'?'ملاحظات:':'Notes:'))}</b><bdi>${escapeHtml(langField(metaRow, 'notes', lang))}</bdi></span>
          </div>
        </div>
      </div>
      <div class="cert-footer">
        <div class="cert-sig">
          <div class="cert-sig-line"><bdi>${escapeHtml(langField(sigL, 'name', lang))}</bdi></div>
          <div><bdi>${escapeHtml(langField(sigL, 'title', lang))}</bdi></div>
        </div>
        ${showQR ? `<div class="cert-qr">
          <div class="qr-target" data-qr-content="${escapeHtml(meta.qr_content || '')}"></div>
          <div class="cert-qr-label">${escapeHtml(langField(meta, 'qr_label', lang) || (lang==='ar'?'تحقق':'Verify'))}</div>
        </div>` : '<div></div>'}
        <div class="cert-sig">
          <div class="cert-sig-line"><bdi>${escapeHtml(langField(sigR, 'name', lang))}</bdi></div>
          <div><bdi>${escapeHtml(langField(sigR, 'title', lang))}</bdi></div>
        </div>
      </div>
    </div>`;
  return sheet;
}

async function render(data, config) {
  const wrap = document.getElementById('previewWrap');
  wrap.innerHTML = '';
  const sheet = buildSheet(data, config);
  wrap.appendChild(sheet);

  const qrTarget = sheet.querySelector('.qr-target');
  if (qrTarget && qrTarget.dataset.qrContent) {
    const accent = getComputedStyle(sheet.querySelector('.cert')).getPropertyValue('--c-accent').trim() || '#000';
    new QRCode(qrTarget, { text: qrTarget.dataset.qrContent, width: 62, height: 62, colorDark: accent || '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M });
  }

  try { await document.fonts.ready; } catch (e) {}
  document.body.dataset.renderStatus = 'complete';
  if (config.autoPrint) setTimeout(() => window.print(), 300);
}

async function init() {
  const config = getConfig();
  try {
    const data = await loadData();
    if (!data || typeof data !== 'object') throw new Error('Loaded data is not an object');
    await render(data, config);
  } catch (e) {
    showError('Cannot render Best Loft certificate', e.message, 'See BEST_LOFT_CERT_PROD_SPEC.md for the JSON schema. Same schema as portrait.');
  }
}

init();
</script>
</body>
</html>
